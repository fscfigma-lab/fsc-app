name: 📲 Web Push (от FSC App)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # каждые 30 минут — обрабатывает очередь

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Установить web-push
        run: npm install web-push

      - name: Отправить Web Push из очереди
        uses: actions/github-script@v7
        env:
          SUPA_URL: 'https://yhsedgaimfgbcqbjltkv.supabase.co'
          SUPA_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc2VkZ2FpbWZnYmNxYmpsdGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjQxOTMsImV4cCI6MjA5NjYwMDE5M30.aThP2KxMEmw0DHf0PPIMF82SiqSLBRbA9Q-HuHENxIE'
        with:
          script: |
            const webpush = require('./node_modules/web-push');

            const SUPA_URL = process.env.SUPA_URL;
            const SUPA_KEY = process.env.SUPA_KEY;
            const headers = {
              'apikey': SUPA_KEY,
              'Authorization': `Bearer ${SUPA_KEY}`
            };

            // 1. Загружаем VAPID ключи из Supabase
            const cfgRes = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.push_config&select=data`, { headers });
            const cfgRows = await cfgRes.json();
            const cfg = cfgRows?.[0]?.data;
            if (!cfg?.vapidPrivate) {
              core.setFailed('VAPID ключи не найдены в Supabase (push_config)');
              return;
            }
            webpush.setVapidDetails(cfg.vapidEmail || 'mailto:fscfigma@gmail.com', cfg.vapidPublic, cfg.vapidPrivate);
            console.log('VAPID загружен из Supabase ✅');

            // 2. Загружаем очередь
            const qRes = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.push_queue&select=data`, { headers });
            const qRows = await qRes.json();
            const queue = qRows?.[0]?.data || [];
            if (queue.length === 0) { console.log('Очередь пуста'); return; }
            console.log(`В очереди: ${queue.length} уведомлений`);

            // 3. Загружаем подписки
            const sRes = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.push_subs&select=data`, { headers });
            const sRows = await sRes.json();
            const subs = sRows?.[0]?.data || {};
            const subEntries = Object.entries(subs);
            if (subEntries.length === 0) { console.log('Подписчиков нет'); return; }
            console.log(`Подписчиков: ${subEntries.length}`);

            // 4. Отправляем
            const deadSubs = new Set();
            let sent = 0, failed = 0;
            for (const notif of queue) {
              const payload = JSON.stringify({ title: notif.title, body: notif.body, tag: notif.tag || 'fsc' });
              for (const [devId, sub] of subEntries) {
                try {
                  const result = await webpush.sendNotification(sub, payload);
                  console.log(`✅ [${devId.slice(0,6)}]: ${result.statusCode}`);
                  sent++;
                } catch (e) {
                  console.error(`❌ [${devId.slice(0,6)}]: ${e.statusCode} — ${e.message}`);
                  failed++;
                  if (e.statusCode === 410 || e.statusCode === 404) deadSubs.add(devId);
                }
              }
            }

            // 5. Чистим мёртвые подписки
            if (deadSubs.size > 0) {
              for (const id of deadSubs) delete subs[id];
              await fetch(`${SUPA_URL}/rest/v1/app_data`, {
                method: 'POST',
                headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify({ id: 'push_subs', data: subs })
              });
            }

            // 6. Очищаем очередь
            await fetch(`${SUPA_URL}/rest/v1/app_data`, {
              method: 'POST',
              headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
              body: JSON.stringify({ id: 'push_queue', data: [] })
            });

            console.log(`Итого: отправлено ${sent}, ошибок ${failed}`);
            if (failed > 0 && sent === 0) core.setFailed(`Все отправки провалились: ${failed} ошибок`);

      - name: Ежедневные уведомления (Telegram + очередь)
        uses: actions/github-script@v7
        env:
          SUPA_URL: 'https://yhsedgaimfgbcqbjltkv.supabase.co'
          SUPA_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc2VkZ2FpbWZnYmNxYmpsdGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjQxOTMsImV4cCI6MjA5NjYwMDE5M30.aThP2KxMEmw0DHf0PPIMF82SiqSLBRbA9Q-HuHENxIE'
        with:
          script: |
            const SUPA_URL = process.env.SUPA_URL;
            const SUPA_KEY = process.env.SUPA_KEY;
            const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` };

            const now = new Date();
            const utcHour = now.getUTCHours();
            const today = now.toISOString().slice(0, 10);

            // Догоняющее окно вместо точного часа. GitHub Actions не гарантирует
            // ровно "каждые 30 мин" — при нагрузке прогоны сдвигаются часами
            // (наблюдали реальные разрывы 04:45→08:30, 12:00→16:23 UTC), и если
            // ровно нужный час (6 или 15) пропущен — старая логика теряла слот
            // на весь день без дозвона. Теперь: окно открыто несколько часов,
            // первый же прогон в его пределах досылает слот, если ещё не слали.
            const stRes = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.notify_state&select=data`, { headers });
            const stRows = await stRes.json();
            const state = stRows?.[0]?.data || {};
            const isMorning = utcHour >= 6 && utcHour < 15 && state.last_morning !== today;
            const isEvening = utcHour >= 15 && state.last_evening !== today;
            if (!isMorning && !isEvening) {
              console.log(`Не время или уже отправлено (${utcHour}:xx UTC, today=${today}, last_morning=${state.last_morning}, last_evening=${state.last_evening}) — пропуск`);
              return;
            }
            const slotKey = isMorning ? 'last_morning' : 'last_evening';

            // Загружаем данные
            const res = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.main&select=data`, { headers });
            const rows = await res.json();
            if (!rows?.length) { console.log('Нет данных'); return; }
            const D = rows[0].data;

            const BOT_TOKEN = D.tgBotToken;
            const TG_ADMIN = D.tgAdminId;

            async function tgSend(chatId, text) {
              if (!BOT_TOKEN || !chatId) return;
              const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' })
              });
              const j = await r.json();
              console.log(`TG → ${chatId}: ${j.ok ? '✅' : '❌ ' + j.description}`);
            }

            const fmt = d => d ? d.slice(5).replace('-', '/') : '?';
            const daysDiff = d => Math.floor((new Date(today) - new Date(d)) / 86400000);
            const tasks = D.tasks || [];
            const projects = D.projects || [];
            const stages = D.stages || [];
            const getProjName = pid => projects.find(p => p.id === pid)?.name || '—';
            const messages = [];

            // ── СВОДКА В TELEGRAM (09:00 и 18:00 МСК) ──────────────────
            if (isMorning || isEvening) {
              const overdueT = tasks.filter(t => !t.done && t.dead && t.dead < today)
                .sort((a,b) => a.dead.localeCompare(b.dead));
              const todayT  = tasks.filter(t => !t.done && t.dead === today);
              const overdueS = stages.filter(s => !s.done && s.deadline && s.deadline < today)
                .sort((a,b) => a.deadline.localeCompare(b.deadline));
              const todayS  = stages.filter(s => !s.done && s.deadline === today);

              const dateRu = d => { const [y,m,dd]=d.split('-'); return `${dd}.${m}`; };
              const ago = d => { const n=daysDiff(d); return n===1?'вчера':`${n} дн. назад`; };

              let lines = [];
              const dateStr = new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',timeZone:'Europe/Moscow'});
              const slotEmoji = isMorning ? '☀️' : '🌙';
              const slotLabel = isMorning ? 'Утренняя' : 'Вечерняя';
              lines.push(`${slotEmoji} <b>${slotLabel} сводка FSC — ${dateStr}</b>\n`);

              if (overdueT.length) {
                lines.push(`🔴 <b>Просрочено задач: ${overdueT.length}</b>`);
                overdueT.slice(0,8).forEach(t => {
                  const hi = ['high','critical'].includes(t.prio) ? ' ⚡' : '';
                  lines.push(`  • ${t.name||t.title}${hi}\n    ${t.who||'не назначен'} · ${dateRu(t.dead)} (${ago(t.dead)})`);
                });
                if (overdueT.length > 8) lines.push(`  ...и ещё ${overdueT.length-8}`);
                lines.push('');
              }

              if (todayT.length) {
                lines.push(`📅 <b>Срок сегодня: ${todayT.length} задач</b>`);
                todayT.slice(0,6).forEach(t => {
                  lines.push(`  • ${t.name||t.title} — ${t.who||'не назначен'}`);
                });
                if (todayT.length > 6) lines.push(`  ...и ещё ${todayT.length-6}`);
                lines.push('');
              }

              if (overdueS.length) {
                lines.push(`🏗 <b>Просрочено этапов: ${overdueS.length}</b>`);
                overdueS.slice(0,5).forEach(s => {
                  lines.push(`  • ${s.name} — ${getProjName(s.pid)} (${ago(s.deadline)})`);
                });
                if (overdueS.length > 5) lines.push(`  ...и ещё ${overdueS.length-5}`);
                lines.push('');
              }

              if (todayS.length) {
                lines.push(`📌 <b>Этапы сегодня: ${todayS.length}</b>`);
                todayS.forEach(s => lines.push(`  • ${s.name} — ${getProjName(s.pid)}`));
                lines.push('');
              }

              // Статистика проектов
              const activeP  = projects.filter(p=>p.status==='active').length;
              const overdueP = projects.filter(p=>p.status==='overdue').length;
              lines.push(`📊 Проектов: ${activeP} активных, ${overdueP} просрочено · Задач в работе: ${tasks.filter(t=>!t.done).length}`);

              if (overdueT.length || todayT.length || overdueS.length || todayS.length) {
                const msg = lines.join('\n');
                const targets = [D.tgAdminId, D.tgTechDirId].filter(Boolean);
                for (const id of targets) await tgSend(id, msg);
              } else {
                const targets = [D.tgAdminId, D.tgTechDirId].filter(Boolean);
                for (const id of targets) await tgSend(id, `✅ <b>${slotLabel} сводка FSC</b>\n\nПросроченных задач и этапов нет. Всё по плану 👍`);
              }
            }

            // Только утром — очередь push
            if (isMorning) {
              const overdueAll = tasks.filter(t => !t.done && t.dead && t.dead < today);
              const todayAll = tasks.filter(t => !t.done && t.dead === today);
              const overdueStages = stages.filter(s => !s.done && s.deadline && s.deadline < today);
              const todayStages = stages.filter(s => !s.done && s.deadline === today);

              if (overdueAll.length > 0) {
                const lines = overdueAll.slice(0,5).map(t=>`• ${t.name||t.title} (${t.who||'—'}) [${fmt(t.dead)}]`);
                if (overdueAll.length>5) lines.push(`...и ещё ${overdueAll.length-5}`);
                messages.push({title:`⚠️ Просрочено задач: ${overdueAll.length}`, body:lines.join('\n'), tag:'warning', ts:Date.now()});
              }
              if (todayAll.length > 0) {
                const lines = todayAll.slice(0,5).map(t=>`• ${t.name||t.title} (${t.who||'—'})`);
                messages.push({title:`📅 Дедлайн сегодня: ${todayAll.length} задач`, body:lines.join('\n'), tag:'today', ts:Date.now()});
              }
              if (overdueStages.length > 0) {
                const lines = overdueStages.slice(0,5).map(s=>`• ${s.name} — ${getProjName(s.pid)} [${fmt(s.deadline)}]`);
                if (overdueStages.length>5) lines.push(`...и ещё ${overdueStages.length-5}`);
                messages.push({title:`🏗 Просрочено этапов: ${overdueStages.length}`, body:lines.join('\n'), tag:'warning', ts:Date.now()});
              }
              if (todayStages.length > 0) {
                const lines = todayStages.slice(0,5).map(s=>`• ${s.name} — ${getProjName(s.pid)}`);
                messages.push({title:`📌 Срок этапа сегодня: ${todayStages.length}`, body:lines.join('\n'), tag:'today', ts:Date.now()});
              }

              // Пятница — еженедельный отчёт
              if (now.getUTCDay() === 5) {
                const active = projects.filter(p=>p.status==='active').length;
                const overdue = projects.filter(p=>p.status==='overdue').length;
                const done = projects.filter(p=>p.status==='done').length;
                const avgPct = projects.length ? Math.round(projects.reduce((s,p)=>s+(p.pct||0),0)/projects.length) : 0;
                messages.push({title:'📊 Итоги недели FSC', body:`Активных: ${active} | Просрочено: ${overdue} | Завершено: ${done}\nСредний прогресс: ${avgPct}%\nОткрытых задач: ${tasks.filter(t=>!t.done).length}`, tag:'weekly', ts:Date.now()});
              }

              if (messages.length > 0) {
                const qRes = await fetch(`${SUPA_URL}/rest/v1/app_data?id=eq.push_queue&select=data`, { headers });
                const qRows = await qRes.json();
                const queue = [...(qRows?.[0]?.data || []), ...messages];
                await fetch(`${SUPA_URL}/rest/v1/app_data`, {
                  method: 'POST',
                  headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
                  body: JSON.stringify({ id: 'push_queue', data: queue })
                });
                console.log(`Добавлено ${messages.length} уведомлений в очередь`);
              }
            }

            // Сохраняем отметку — этот слот отправлен
            state[slotKey] = today;
            await fetch(`${SUPA_URL}/rest/v1/app_data`, {
              method: 'POST',
              headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
              body: JSON.stringify({ id: 'notify_state', data: state })
            });
            console.log(`✅ ${slotKey} = ${today} сохранено`);
