<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSC App — Интерактивная инструкция</title>
<style>
:root{
  --bg:#111;--s1:#1a1a1a;--s2:#222;--s3:#2c2c2c;--s4:#363636;
  --border:#333;--border2:#444;
  --amber:#C9952A;--amber2:#E8B44A;--amber-bg:rgba(201,149,42,.12);--amber-bd:rgba(201,149,42,.3);
  --red:#B91C1C;--red-bg:rgba(185,28,28,.2);--red-bd:rgba(185,28,28,.4);
  --green:#166534;--green-bg:rgba(22,101,52,.2);--green-bd:rgba(22,101,52,.4);
  --blue-bg:rgba(29,78,216,.25);--blue-bd:rgba(29,78,216,.4);
  --t1:#f0ede8;--t2:#c0bab2;--t3:#888078;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1)}

/* ── ROLE PICKER ───────────────────────────────────── */
#rp{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);z-index:200;
  transition:opacity .5s,transform .5s;
}
#rp.out{opacity:0;transform:scale(.96);pointer-events:none}
.rp-glow{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse at top,rgba(201,149,42,.15) 0%,transparent 70%);
  pointer-events:none;
}
.rp-logo{font-size:3.5rem;font-weight:900;color:var(--amber);letter-spacing:-3px;margin-bottom:4px}
.rp-sub{color:var(--t3);font-size:.9rem;margin-bottom:8px}
.rp-badge{
  display:inline-block;background:var(--amber-bg);border:1px solid var(--amber-bd);
  color:var(--amber);border-radius:20px;padding:3px 14px;font-size:.75rem;
  font-weight:600;margin-bottom:48px;
}
.rp-prompt{color:var(--t2);font-size:1rem;margin-bottom:24px}
.rp-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.rpc{
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);
  padding:28px 28px 22px;width:240px;cursor:pointer;
  transition:border-color .25s,transform .25s,background .25s;
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.rpc:hover{border-color:var(--amber);background:var(--s3);transform:translateY(-4px)}
.rpc-icon{font-size:2.8rem;margin-bottom:14px}
.rpc-title{font-weight:800;font-size:1.05rem;color:var(--t1);line-height:1.3;margin-bottom:8px}
.rpc-names{font-size:.72rem;color:var(--t3);line-height:1.6;margin-bottom:18px}
.rpc-btn{
  display:inline-block;background:var(--amber);color:#000;
  font-weight:700;font-size:.82rem;padding:7px 18px;border-radius:8px;
  transition:background .2s;
}
.rpc:hover .rpc-btn{background:var(--amber2)}

/* ── MAIN APP ──────────────────────────────────────── */
#main{
  position:fixed;inset:0;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
#main.on{opacity:1;pointer-events:all}

/* Progress bar */
#pb{height:3px;background:var(--s3);flex-shrink:0}
#pbf{height:100%;background:var(--amber);transition:width .45s ease}

/* Header */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 28px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.hd-left{display:flex;align-items:center;gap:10px}
.hd-logo{font-weight:900;font-size:1.2rem;color:var(--amber)}
.hd-pipe{color:var(--border);font-size:1.1rem}
.hd-title{font-size:.85rem;color:var(--t3)}
#hd-dots{display:flex;gap:7px}
.hd-dot{
  width:8px;height:8px;border-radius:50%;background:var(--border);
  cursor:pointer;transition:background .2s,transform .2s;
}
.hd-dot.done{background:var(--amber);opacity:.5}
.hd-dot.cur{background:var(--amber);transform:scale(1.35)}
.hd-back{
  background:none;border:1px solid var(--border);color:var(--t3);
  padding:5px 12px;border-radius:7px;font-size:.78rem;cursor:pointer;
  transition:border-color .2s,color .2s;
}
.hd-back:hover{border-color:var(--amber);color:var(--amber)}

/* Stage */
#stage{flex:1;position:relative;overflow:hidden}

/* Chapters */
.chapter{
  position:absolute;inset:0;display:flex;
  opacity:0;pointer-events:none;
  transition:opacity .35s,transform .35s;
  transform:translateX(50px);
}
.chapter.active{opacity:1;pointer-events:all;transform:translateX(0)}
.chapter.prev{opacity:0;transform:translateX(-50px)}
.chapter.fullscreen{display:block}

/* Left text panel */
.ch-l{
  width:42%;min-width:300px;
  padding:36px 36px 28px 44px;
  display:flex;flex-direction:column;justify-content:center;
  overflow-y:auto;
}
.ch-role{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--amber-bg);border:1px solid var(--amber-bd);
  color:var(--amber);border-radius:20px;padding:3px 12px;
  font-size:.72rem;font-weight:600;margin-bottom:16px;
}
.ch-num{font-size:.7rem;color:var(--amber);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.ch-title{font-size:2rem;font-weight:800;line-height:1.15;color:var(--t1);margin-bottom:12px}
.ch-sub{color:var(--t2);font-size:.93rem;line-height:1.65;margin-bottom:22px}
.ch-pts{list-style:none;margin-bottom:20px}
.ch-pts li{
  padding:10px 0;border-bottom:1px solid var(--border);
  display:flex;gap:12px;align-items:flex-start;
  font-size:.87rem;color:var(--t2);line-height:1.5;
}
.ch-pts li:last-child{border-bottom:none}
.ch-pts .pi{color:var(--amber);flex-shrink:0;margin-top:1px;font-size:.95rem}
.ch-tip{
  background:var(--amber-bg);border-left:3px solid var(--amber);
  border-radius:0 8px 8px 0;padding:12px 15px;
  font-size:.83rem;color:var(--t2);line-height:1.55;
}
.ch-tip b{color:var(--amber)}

/* Right mock panel */
.ch-r{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px;background:var(--s1);border-left:1px solid var(--border);
  position:relative;overflow:hidden;
}
.ch-r::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(201,149,42,.06) 0%,transparent 70%);
  pointer-events:none;
}

/* Mock screen */
.ms{
  width:100%;max-width:440px;background:var(--s2);
  border-radius:14px;border:1px solid var(--border2);
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);
  position:relative;
}
.ms-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:var(--s3);border-bottom:1px solid var(--border);
}
.ms-logo{font-weight:900;font-size:.9rem;color:var(--amber)}
.ms-icons{color:var(--t3);font-size:.95rem;display:flex;gap:8px}
.ms-body{padding:14px}
.ms-greeting{font-size:.75rem;color:var(--t3);margin-bottom:12px}

/* Stat cards */
.ms-stats{display:flex;gap:8px;margin-bottom:14px}
.ms-stat{
  flex:1;border-radius:8px;padding:10px 8px;text-align:center;
  animation:popIn .4s ease backwards;
}
.ms-stat.r{background:var(--red-bg);border:1px solid var(--red-bd)}
.ms-stat.a{background:var(--amber-bg);border:1px solid var(--amber-bd)}
.ms-stat.g{background:var(--green-bg);border:1px solid var(--green-bd)}
.ms-stat-n{font-size:1.5rem;font-weight:800}
.ms-stat.r .ms-stat-n{color:#f87171}
.ms-stat.a .ms-stat-n{color:var(--amber)}
.ms-stat.g .ms-stat-n{color:#4ade80}
.ms-stat-l{font-size:.6rem;color:var(--t3);margin-top:2px}
.ms-stat:nth-child(1){animation-delay:.1s}
.ms-stat:nth-child(2){animation-delay:.2s}
.ms-stat:nth-child(3){animation-delay:.3s}

/* Feed */
.ms-h{font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.ms-fi{
  display:flex;gap:8px;align-items:flex-start;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.04);
  animation:slideUp .3s ease backwards;
}
.ms-fi:last-child{border-bottom:none}
.ms-fd{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:4px}
.ms-ft{font-size:.7rem;color:var(--t2);line-height:1.4}
.ms-fm{font-size:.63rem;color:var(--t3)}
.ms-fi:nth-child(2){animation-delay:.1s}
.ms-fi:nth-child(3){animation-delay:.2s}
.ms-fi:nth-child(4){animation-delay:.3s}

/* Bottom nav */
.ms-nav{display:flex;border-top:1px solid var(--border)}
.ms-ni{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px;font-size:.56rem;color:var(--t3);gap:3px;
}
.ms-ni.on{color:var(--amber)}
.ms-ni-i{font-size:1.05rem}

/* Project cards */
.ms-pc{
  background:var(--s3);border-radius:8px;padding:11px 12px;margin-bottom:8px;
  border-left:3px solid var(--amber);
  animation:slideUp .3s ease backwards;
}
.ms-pc.red{border-left-color:var(--red)}
.ms-pc.green{border-left-color:#166534}
.ms-pc:nth-child(2){animation-delay:.1s}
.ms-pc:nth-child(3){animation-delay:.2s}
.ms-pn{font-size:.78rem;font-weight:600;color:var(--t1);margin-bottom:5px}
.ms-pm{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ms-pcl{font-size:.65rem;color:var(--t3)}
.ms-badge{font-size:.6rem;padding:2px 7px;border-radius:10px;font-weight:600}
.ms-badge.a{background:var(--amber-bg);color:var(--amber)}
.ms-badge.r{background:var(--red-bg);color:#f87171}
.ms-badge.g{background:var(--green-bg);color:#4ade80}
.ms-prog{height:4px;background:var(--border);border-radius:2px}
.ms-pf{height:100%;border-radius:2px;background:var(--amber);width:0;transition:width 1.1s ease}
.ms-pf.red{background:var(--red)}
.ms-pf.green{background:#166534}

/* Gantt */
.ms-glegend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--border)}
.ms-gli{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--t3)}
.ms-gld{width:9px;height:9px;border-radius:2px}
.ms-gbody{padding:10px 12px}
.ms-ghdr{display:flex;align-items:center;margin-bottom:8px}
.ms-ghl{width:80px;flex-shrink:0;font-size:.6rem;color:var(--t3)}
.ms-ghs{flex:1;display:flex;justify-content:space-between;font-size:.58rem;color:var(--t3)}
.ms-grow{display:flex;align-items:center;margin-bottom:5px}
.ms-gn{width:80px;flex-shrink:0;font-size:.66rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-gn.sub{font-size:.6rem;color:var(--t3);padding-left:10px}
.ms-gtrack{flex:1;height:16px;background:var(--s1);border-radius:3px;position:relative}
.ms-gtrack.sub-t{height:12px;margin:2px 0}
.ms-gbar{
  position:absolute;height:100%;border-radius:3px;
  animation:barGrow .9s ease backwards;
  display:flex;align-items:center;padding:0 5px;
  font-size:.56rem;font-weight:600;overflow:hidden;white-space:nowrap;
}
.ms-gbar.a{background:rgba(201,149,42,.65);color:#fff}
.ms-gbar.r{background:rgba(185,28,28,.65);color:#fff}
.ms-gbar.g{background:rgba(22,101,52,.65);color:#fff}
.ms-gbar.pill{
  background:var(--green-bg);color:#4ade80;
  border:1px solid var(--green-bd);font-size:.55rem;
  left:0!important;width:auto!important;padding:0 7px;min-width:fit-content;
}
.ms-gbar.pill.r2{background:var(--red-bg);color:#f87171;border-color:var(--red-bd)}
.ms-gtoday{position:absolute;top:-18px;bottom:-4px;width:2px;background:#ef4444;z-index:5}
.ms-gtoday::before{content:'Сегодня';position:absolute;top:0;left:3px;font-size:.55rem;color:#ef4444;white-space:nowrap}
.ms-gtoday::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #ef4444}

/* Tasks */
.ms-task{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;background:var(--s3);border-radius:8px;margin-bottom:6px;
  animation:slideUp .3s ease backwards;
}
.ms-task:nth-child(2){animation-delay:.08s}
.ms-task:nth-child(3){animation-delay:.16s}
.ms-task:nth-child(4){animation-delay:.24s}
.ms-task:nth-child(5){animation-delay:.32s}
.ms-tck{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.ms-ttx{flex:1;font-size:.72rem;color:var(--t2)}
.ms-tb{font-size:.58rem;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap}
.ms-tb.crit{background:var(--red-bg);color:#f87171}
.ms-tb.high{background:rgba(234,88,12,.25);color:#fb923c}
.ms-tb.med{background:var(--amber-bg);color:var(--amber)}
.ms-tb.norm{background:var(--blue-bg);color:#60a5fa}
.ms-tb.fast{background:var(--green-bg);color:#4ade80}

/* Login mock */
.ms-login{padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px}
.ms-llogo{font-size:2rem;font-weight:900;color:var(--amber);letter-spacing:-2px}
.ms-lsub{font-size:.72rem;color:var(--t3)}
.ms-nlist{width:100%;display:flex;flex-direction:column;gap:4px}
.ms-ni2{
  padding:7px 11px;border-radius:6px;background:var(--s3);
  font-size:.72rem;color:var(--t2);display:flex;align-items:center;gap:8px;
}
.ms-ni2.sel{background:var(--amber-bg);color:var(--amber);border-left:2px solid var(--amber)}
.ms-ni2-av{
  width:22px;height:22px;border-radius:50%;background:var(--amber-bg);
  color:var(--amber);font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ms-ni2.sel .ms-ni2-av{background:var(--amber);color:#000}
.ms-pin{display:flex;gap:10px;margin-top:4px}
.ms-pd{
  width:13px;height:13px;border-radius:50%;
  border:2px solid var(--border);background:transparent;
  transition:background .2s,border-color .2s;
}
.ms-pd.on{background:var(--amber);border-color:var(--amber)}

/* Notif mock */
.ms-notif{
  display:flex;gap:11px;align-items:flex-start;
  padding:11px 12px;background:var(--s3);border-radius:8px;margin-bottom:8px;
  animation:slideUp .3s ease backwards;
}
.ms-notif:nth-child(2){animation-delay:.1s}
.ms-notif:nth-child(3){animation-delay:.2s}
.ms-ni-ic{font-size:1.4rem;flex-shrink:0;line-height:1}
.ms-ni-tx .ms-ni-hd{font-size:.74rem;font-weight:600;color:var(--t1);margin-bottom:2px}
.ms-ni-tx .ms-ni-sd{font-size:.66rem;color:var(--t3);line-height:1.4}

/* Risk table */
.ms-risk{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.ms-rh{display:flex;background:var(--s4);padding:6px 10px;border-bottom:1px solid var(--border)}
.ms-rh div{flex:1;font-size:.62rem;color:var(--t3);font-weight:600}
.ms-rr{display:flex;padding:8px 10px;border-bottom:1px solid var(--border);align-items:center;animation:slideUp .3s ease backwards}
.ms-rr:last-child{border-bottom:none}
.ms-rr:nth-child(3){animation-delay:.1s}
.ms-rr:nth-child(4){animation-delay:.2s}
.ms-rr:nth-child(5){animation-delay:.3s}
.ms-rr div{flex:1;font-size:.68rem;color:var(--t2)}
.ms-risk-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.6rem;font-weight:600}
.ms-risk-badge.crit{background:var(--red-bg);color:#f87171}
.ms-risk-badge.high{background:rgba(234,88,12,.2);color:#fb923c}
.ms-risk-badge.ok{background:var(--green-bg);color:#4ade80}

/* Hotspots */
.hs{position:absolute;z-index:20;cursor:pointer}
.hs-dot{
  width:22px;height:22px;border-radius:50%;background:var(--amber);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:#000;
  animation:pulse 2s infinite;box-shadow:0 0 0 0 rgba(201,149,42,.5);
}
.hs-tt{
  position:absolute;left:28px;top:-6px;
  background:var(--s1);border:1px solid var(--amber);border-radius:9px;
  padding:10px 14px;width:190px;font-size:.76rem;line-height:1.5;color:var(--t2);
  opacity:0;pointer-events:none;transform:translateX(-6px);
  transition:opacity .2s,transform .2s;z-index:30;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
}
.hs-tt b{color:var(--t1);display:block;margin-bottom:3px}
.hs.open .hs-tt{opacity:1;transform:translateX(0)}
.hs.open .hs-dot{background:var(--amber2);animation:none}

/* Finish */
.ch-finish{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:40px;
}
.fin-icon{font-size:4.5rem;margin-bottom:20px;animation:bounceIn .6s ease backwards}
.fin-t{font-size:2.4rem;font-weight:800;color:var(--t1);margin-bottom:12px}
.fin-s{color:var(--t2);font-size:1rem;line-height:1.65;margin-bottom:36px;max-width:520px}
.fin-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.fin-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 26px;border-radius:10px;font-weight:700;font-size:.93rem;
  text-decoration:none;cursor:pointer;transition:transform .2s,background .2s;
  border:none;
}
.fin-btn.primary{background:var(--amber);color:#000}
.fin-btn.primary:hover{background:var(--amber2);transform:translateY(-2px)}
.fin-btn.sec{background:var(--s3);color:var(--t1);border:1px solid var(--border)}
.fin-btn.sec:hover{border-color:var(--amber);color:var(--amber);transform:translateY(-2px)}

/* Nav footer */
#navf{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 40px;border-top:1px solid var(--border);flex-shrink:0;
}
.nb{
  display:flex;align-items:center;gap:8px;
  background:none;border:1.5px solid var(--border);color:var(--t2);
  padding:9px 20px;border-radius:8px;cursor:pointer;font-size:.87rem;
  transition:border-color .2s,color .2s;
}
.nb:hover{border-color:var(--amber);color:var(--t1)}
.nb:disabled{opacity:.3;cursor:not-allowed}
.nb.pri{background:var(--amber);color:#000;border-color:var(--amber);font-weight:700}
.nb.pri:hover{background:var(--amber2);border-color:var(--amber2)}
#ch-info{font-size:.8rem;color:var(--t3)}

/* Animations */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,149,42,.5)}60%{box-shadow:0 0 0 9px rgba(201,149,42,0)}}
@keyframes popIn{from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{opacity:0;transform:scaleX(0);transform-origin:left}to{opacity:1;transform:scaleX(1)}}
@keyframes bounceIn{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}

.confetti{position:fixed;top:0;width:9px;height:9px;border-radius:2px;animation:fall 3s ease-in forwards;z-index:999;pointer-events:none}

@media(max-width:680px){
  .chapter{flex-direction:column}
  .ch-l{width:100%;min-width:0;padding:20px 20px 14px;justify-content:flex-start}
  .ch-title{font-size:1.5rem}
  .ch-r{border-left:none;border-top:1px solid var(--border);padding:16px}
  #navf{padding:10px 16px}
  .rpc{width:100%;max-width:340px}
}
</style>
</head>
<body>

<!-- ══ ROLE PICKER ══════════════════════════════════════════ -->
<div id="rp">
  <div class="rp-glow"></div>
  <div class="rp-logo">FSC</div>
  <div class="rp-sub">Система управления дизайн-проектами</div>
  <div class="rp-badge">✦ Интерактивная инструкция</div>
  <p class="rp-prompt">Выбери свою роль, чтобы начать</p>
  <div class="rp-cards">
    <div class="rpc" onclick="startRole('rp')">

// ── STATE & LOGIC ──────────────────────────────────────────────────────────
let role='rp',idx=0;
const $=id=>document.getElementById(id);

function startRole(r){
  role=r;idx=0;
  $('rp').classList.add('out');
  setTimeout(()=>{
    $('main').classList.add('on');
    renderDots();
    renderChapter(0);
  },500);
}

function goHome(){
  $('main').classList.remove('on');
  setTimeout(()=>$('rp').classList.remove('out'),100);
}

function renderDots(){
  const chs=CHAPTERS[role];
  $('hd-dots').innerHTML=chs.map((_,i)=>`<div class="hd-dot" onclick="goTo(${i})" title="Шаг ${i+1}"></div>`).join('');
}

function updateDots(){
  document.querySelectorAll('.hd-dot').forEach((d,i)=>{
    d.className='hd-dot'+(i<idx?' done':i===idx?' cur':'');
  });
}

function setProgress(){
  const chs=CHAPTERS[role];
  $('pbf').style.width=((idx/(chs.length-1))*100)+'%';
}

function chapterHTML(ch,i){
  if(ch.finish)return`<div class="chapter${i===idx?' active':''}" id="ch-${i}">
    <div class="ch-finish">
      <div class="fin-icon">🎉</div>
      <div class="fin-t">${ch.title}</div>
      <div class="fin-s">${ch.sub}</div>
      <div class="fin-btns">
        <a class="fin-btn primary" href="${ch.link}" target="_blank">Открыть приложение →</a>
        <button class="fin-btn sec" onclick="goTo(0)">↩ Начать заново</button>
      </div>
    </div>
  </div>`;

  const pts=ch.points?`<ul class="ch-pts">${ch.points.map(p=>`<li><span class="pi">${p.i}</span><span>${p.t}</span></li>`).join('')}</ul>`:'';
  const tip=ch.tip?`<div class="ch-tip">${ch.tip}</div>`:'';

  return`<div class="chapter${i===idx?' active':''}" id="ch-${i}">
    <div class="ch-l">
      <div class="ch-role">👤 ${ROLES[role]}</div>
      <div class="ch-num">Шаг ${ch.num}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-sub">${ch.sub}</div>
      ${pts}${tip}
    </div>
    <div class="ch-r">${ch.mock||''}</div>
  </div>`;
}

function renderChapter(newIdx){
  const chs=CHAPTERS[role];
  const stage=$('stage');

  // Mark old as prev
  const old=stage.querySelector('.chapter.active');
  if(old)old.classList.replace('active','prev');

  // Remove very old prevs after transition
  setTimeout(()=>{
    stage.querySelectorAll('.chapter.prev').forEach(e=>e.remove());
  },400);

  const ch=chs[newIdx];
  const div=document.createElement('div');
  div.innerHTML=chapterHTML(ch,newIdx);
  stage.appendChild(div.firstChild);

  // Activate after paint
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const el=stage.querySelector(`#ch-${newIdx}`);
    if(el)el.classList.add('active');
    bindHotspots(el);
    animateOnEntry(el);
  }));

  updateDots();
  setProgress();
  updateNav(newIdx);
  $('ch-info').textContent=`${newIdx+1} из ${chs.length}`;

  if(ch.finish)setTimeout(confetti,300);
}

function animateOnEntry(el){
  if(!el)return;
  // Wait for chapter CSS transition to finish
  setTimeout(()=>{
    // Animate progress bar fills (ms-pf elements with data-w)
    el.querySelectorAll('.ms-pf[data-w]').forEach(b=>{
      b.style.width='0%';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        b.style.width=b.dataset.w+'%';
      }));
    });
    // Count up numbers
    el.querySelectorAll('[data-count]').forEach(n=>{
      const target=parseInt(n.dataset.count);
      let c=0;const step=Math.ceil(target/12);
      const t=setInterval(()=>{c=Math.min(c+step,target);n.textContent=c;if(c>=target)clearInterval(t);},55);
    });
  }, 380);
}

function bindHotspots(el){
  if(!el)return;
  el.querySelectorAll('.hs').forEach(h=>{
    h.addEventListener('click',e=>{
      e.stopPropagation();
      const wasOpen=h.classList.contains('open');
      el.querySelectorAll('.hs.open').forEach(x=>x.classList.remove('open'));
      if(!wasOpen)h.classList.add('open');
    });
  });
  el.addEventListener('click',()=>el.querySelectorAll('.hs.open').forEach(x=>x.classList.remove('open')));
}

function updateNav(i){
  const chs=CHAPTERS[role];
  $('btn-prev').disabled=i===0;
  const btn=$('btn-next');
  if(i===chs.length-1){btn.textContent='↩ Начать заново';btn.onclick=()=>goTo(0);}
  else{btn.textContent='Далее →';btn.onclick=next;}
}

function goTo(i){idx=i;renderChapter(i)}
function next(){if(idx<CHAPTERS[role].length-1)goTo(idx+1)}
function prev(){if(idx>0)goTo(idx-1)}

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='Enter')next();
  if(e.key==='ArrowLeft')prev();
});

// Confetti
function confetti(){
  const colors=['#C9952A','#E8B44A','#f0ede8','#4ade80','#60a5fa','#f87171'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*2+'s';
    p.style.animationDuration=(2+Math.random()*2)+'s';
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  }
}
</script>
